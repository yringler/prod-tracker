<!doctype html>
<html lang="en" class="wa-brand-blue">
  <head>
    <meta charset="utf-8" />
    <!-- Load-bearing: without it the built bundles are referenced relatively, so a
         direct load of a nested route (e.g. /risk/admin) resolves main-*.js against
         /risk/, hits the Worker's SPA fallback, gets index.html back, and the module
         dies on its MIME check — a silent blank page. Pinned by client/test. -->
    <base href="/" />
    <title>Story-point Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b1020" />
    <!-- Apply the saved/OS theme before first paint to avoid a flash of the wrong
         theme. ThemeService (Angular) uses the same logic and stays in sync. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('sp-theme');
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.classList.add('wa-' + theme);
          if (theme === 'light') {
            document
              .querySelector('meta[name="theme-color"]')
              .setAttribute('content', '#f5f7fb');
          }
        } catch (e) {
          document.documentElement.classList.add('wa-dark');
        }
      })();
    </script>
  </head>
  <body>
    <sp-root></sp-root>
  </body>
</html>
