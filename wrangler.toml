name = "storypoint-tracker"
main = "worker/src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

# Build the Angular SPA before every deploy/dev so [assets] below is populated.
# client/dist is gitignored, so this is the single source of "how to build" —
# it runs for `wrangler deploy`, `wrangler dev`, and Workers Builds (whose default
# deploy command is `npx wrangler deploy`). Output dir matches [assets].directory.
[build]
command = "npm run test && npm run build:client"

# Built Angular SPA ships as the Worker's static assets — same origin, no CORS.
[assets]
directory = "client/dist/client/browser"
binding = "ASSETS"
# SPA fallback: unmatched non-/api routes serve index.html.
not_found_handling = "single-page-application"

# Poller runs ~every 3 minutes; JQL window is wider (see jira/poller.ts).
[triggers]
crons = ["*/3 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "storypoint-tracker"
database_id = "80bb229d-7a2c-4ca2-bedb-65bef36c410a"
# Schema changes are versioned, idempotent files in migrations/ applied with
# `wrangler d1 migrations apply` (see the db:migrate* npm scripts). Wrangler
# tracks which files have run in a d1_migrations table.
migrations_dir = "migrations"

# Secrets (set via `wrangler secret put`), NOT vars:
#   JIRA_CLIENT_ID, JIRA_CLIENT_SECRET, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY,
#   ZULIP_API_KEY, ZULIP_WEBHOOK_TOKEN
[vars]
APP_ORIGIN = "https://tracker.yehudardevelopment.com"
OAUTH_REDIRECT_PATH = "/api/auth/callback"
VAPID_SUBJECT = "mailto:admin@example.com"
BOOTSTRAP_ADMIN_ACCOUNT_ID = "557058:fcacbb78-fa49-4419-beee-fe3f90526986"
ZULIP_SITE = "https://yourorg.zulipchat.com"
ZULIP_BOT_EMAIL = "notify-bot@yourorg.zulipchat.com"
